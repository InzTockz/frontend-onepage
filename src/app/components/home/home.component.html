<div class="grid grid-cols-4 gap-4">
  <!-- Cards 01 - 04 -->
  <div class="col-span-3 flex justify-center border border-red-500 p-4 rounded-lg">
    <div class="flex justify-between gap-4 w-full">
      <div class="flex gap-2 items-center">
        <select name="" id="" class="rounded-lg bg-blue-900 p-1.5 text-white">
          <option value="">Seleccionar consultores</option>
        </select>
        <input class="size-4" type="checkbox" name="" id="" />
      </div>
      <div class="flex gap-2 items-center">
        <select name="" id="" class="rounded-lg bg-blue-900 p-1.5 text-white">
          <option value="">Seleccionar clientes</option>
        </select>
        <input class="size-4" type="checkbox" name="" id="" />
      </div>
      <div class="flex gap-2 items-center">
        <select name="" id="" class="rounded-lg p-1.5 border border-orange-500">
          @for (mes of meses; track $index) {
            <option value="">{{ mes }}</option>
          }
        </select>
      </div>
    </div>
  </div>
  <div class="row-span-2 flex items-center gap-3 border border-red-500 p-4 rounded-lg">
    <!-- Gráfico -->
    <div class="flex-shrink-0">
      <apx-chart
        [series]="chartOptions.series!"
        [chart]="chartOptions.chart!"
        [plotOptions]="chartOptions.plotOptions!"
        [fill]="chartOptions.fill!"
        [stroke]="chartOptions.stroke!"
        [colors]="chartOptions.colors!"
      />
    </div>

    <!-- Texto derecho -->
    <div class="flex flex-col">
      <span class="text-xs font-bold tracking-widest text-pink-600"> VENCIDO USD </span>
      <span class="text-2xl font-bold text-gray-800"> 000 K </span>
    </div>
  </div>

  <!-- Card 05 -->
  <div class="col-span-3 flex justify-center border border-red-500 p-4 rounded-lg">05</div>

  <!-- Cards 07 y 08 -->
  <div class="col-span-full flex justify-center border border-red-500 p-4 rounded-lg">06</div>
  <div class="col-span-full flex justify-center border border-red-500 p-4 rounded-lg">07</div>
</div>
